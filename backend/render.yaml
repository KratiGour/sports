services:
  # Backend API Service
  - type: web
    name: cricket-highlights-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2 --worker-class uvicorn.workers.UvicornWorker --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.12
      - key: DATABASE_URL
        fromDatabase:
          name: cricket-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://sports-teal-two.vercel.app
    healthCheckPath: /health

