# IAM already provisioned (run setup_iam.ps1 once):
#   Cloud Build SA  → artifactregistry.writer on repo
#   Cloud Run SA    → artifactregistry.reader on repo
#   Cloud Run SA    → secretmanager.secretAccessor on each secret

# Shorter alias used in all image tags
substitutions:
  _IMAGE: asia-south1-docker.pkg.dev/sports-ai-489110/sports-backend/api

steps:
  # Step 0: Authenticate Docker with Artifact Registry
  - name: "gcr.io/cloud-builders/gcloud"
    id: Auth
    args:
      - auth
      - configure-docker
      - asia-south1-docker.pkg.dev

  # Step 1: Build the Docker image with two tags: one for this commit, one for "latest"
  - name: "gcr.io/cloud-builders/docker"
    id: Build
    waitFor: [Auth]
    args:
      - build
      - -t
      - $_IMAGE:$COMMIT_SHA
      - -t
      - $_IMAGE:latest
      - --cache-from
      - $_IMAGE:latest       # layer-cache from previous build (best-effort)
      - -f
      - backend/Dockerfile
      - backend/             # Docker build context

  # Step 2: Push both tags to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: Push
    args:
      - push
      - --all-tags
      - $_IMAGE
    waitFor: [Build]

  # Step 3: Deploy to Cloud Run  (asia-south1 = Mumbai)
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: Deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - sports-backend
      - --image=$_IMAGE:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      # Resources
      - --memory=4Gi
      - --cpu=2
      - --cpu-boost                                 # extra CPU during cold start
      # Request handling
      - --timeout=3600
      - --concurrency=4
      # Scaling
      - --min-instances=0
      - --max-instances=3
      - --execution-environment=gen2
      # Non-sensitive environment variables (hardcoded is fine)
      - --set-env-vars=CLOUD_RUN=1,GCS_BUCKET_NAME=sports-ai-storage,FRONTEND_URL=https://sports-teal-two.vercel.app,ALLOWED_ORIGINS=https://sports-teal-two.vercel.app,GEMINI_MODEL=gemini-2.5-flash
      # Sensitive vars pulled from Secret Manager
      # Create secrets once: gcloud secrets create DATABASE_URL --data-file=- <<< "your-value"
      - --update-secrets=DATABASE_URL=DATABASE_URL:latest,JWT_SECRET_KEY=JWT_SECRET_KEY:latest,GEMINI_API_KEY_1=GEMINI_API_KEY_1:latest
    waitFor: [Push]

# Store the image in the build artifact list
images:
  - asia-south1-docker.pkg.dev/sports-ai-489110/sports-backend/api:$COMMIT_SHA
  - asia-south1-docker.pkg.dev/sports-ai-489110/sports-backend/api:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8   # Faster builds — large Python deps take time
